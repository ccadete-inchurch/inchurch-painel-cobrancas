name: Gerar lote diário (08:15 BRT)

on:
  schedule:
    # 11:15 UTC = 08:15 BRT (UTC-3). GitHub Actions pode atrasar até ~10min.
    - cron: '15 11 * * *'
  # Permite disparar manualmente pelo GitHub UI (Actions → Run workflow)
  workflow_dispatch:

jobs:
  gerar-lote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Gerar lote
        env:
          GCP_SA_JSON:     ${{ secrets.GCP_SA_JSON }}
          PG_N8N_PASSWORD: ${{ secrets.PG_N8N_PASSWORD }}
        run: python scripts/gerar_lote_cron.py
