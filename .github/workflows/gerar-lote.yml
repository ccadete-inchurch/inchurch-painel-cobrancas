name: Gerar lote diário (08:15 BRT)

on:
  schedule:
    # 11:15 UTC = 08:15 BRT (UTC-3). GitHub Actions pode atrasar até ~10min.
    - cron: '15 11 * * *'
  # Permite disparar manualmente pelo GitHub UI (Actions → Run workflow)
  workflow_dispatch:

jobs:
  gerar-lote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Disparar geração de lote no painel
        run: |
          response=$(curl -sL -o /tmp/body -w "%{http_code}" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: pt-BR,pt;q=0.9,en;q=0.8" \
            "https://painel-cobrancas-inchurch.streamlit.app/?cron_token=${{ secrets.CRON_TOKEN }}")
          echo "HTTP status: $response"
          echo "--- Resposta ---"
          cat /tmp/body | head -100
          if [ "$response" != "200" ]; then
            echo "❌ Falha ao disparar geração (status $response)"
            exit 1
          fi
          if ! grep -q "Lote gerado" /tmp/body; then
            echo "❌ Status 200 mas resposta não contém 'Lote gerado' — provável tela de login"
            exit 1
          fi
          echo "✅ Geração disparada com sucesso"
